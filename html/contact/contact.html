<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="ポートフォリオLPデザイン架空不動産会社のサービスランディングページのお問い合わせページです">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">

    <link rel="icon" href="../assets/images/liferoom_favicon.png">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <title>お問い合わせ | ライフルーム不動産安心サポート</title>
</head>
<body>
    
        <header>
            <div class="container">
                <div class="header__layout">
                    <h1 class="header__logo">
                        <a href="../index.html">
                            <img src="../assets/images/logo.svg" alt="LIFEROOM/ライフルーム不動産"> 
                        </a>
                    </h1>
                    <div class="header__cta">
                       <div class="header__tel">
                            <img src="../assets/images/tel-icon.svg" alt="電話アイコン" class="header__icon" width="37" height="49">
                            <div class="tel__text">
                                <p class="tel__label">電話番号</p>
                                <a href="tel:0311111111" class="tel__num">03-1111-1111</a>
                                <p class="tel__info">受付時間<span class="info__time">9:00~20:00</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <main>
            <div class="contents-wrapper">
                <section id="contact" class="section">
                    <div class="container">

                        <div class="contact__layout">

                            <h2 class="section__title">
                                お問い合わせ
                            </h2>

                            <form class="contact__form" action="./thanks.html">

                                <div class="contact__item">
                                <label for="name">
                                    お名前
                                </label>

                                <input
                                    type="text"
                                    id="name"
                                    name="name"
                                >
                                </div>

                                <div class="contact__item">
                                <label for="tel">
                                    電話番号
                                </label>

                                <input
                                    type="tel"
                                    id="tel"
                                    name="tel"
                                >
                                </div>

                                <div class="contact__item">
                                <label for="email">
                                    メールアドレス
                                </label>

                                <input
                                    type="email"
                                    id="email"
                                    name="email"
                                >
                                </div>

                                <div class="contact__item">
                                <label for="message">
                                    ご相談内容
                                </label>

                                <textarea
                                    id="message"
                                    name="message"
                                ></textarea>
                                </div>

                                <button
                                type="submit"
                                class="btn__cta contact__submit"
                                >
                                送信する
                                </button>

                            </form>

                        </div>

                    </div>
                </section>
                   
           
            </div>
        </main>
        <footer>
            <div class="container">
                <div class="footer__layout">
                    <div class="footer__logo">
                        <img src="../assets/images/logo.svg" alt="LIFEROOM/ライフルーム不動産"> 

                    </div>
                    <div class="tel__text">
                        <p class="tel__label">電話番号</p>
                        <a href="tel:0311111111" class="tel__num">03-1111-1111</a>
                        <p class="tel__info">受付時間<span class="info__time">9:00~20:00</span></p>
                     </div>
                </div>
            </div>
        </footer>
    
    <script src="../js/script.js"></script>
</body>
</html>
