<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="お問い合わせ完了ページ">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">

    <link rel="icon" href="../assets/images/liferoom_favicon.png">

    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">    
    <title>お問い合わせ完了 | ライフルーム不動産安心サポート</title>
</head>

<body>

    <header>
        <div class="container">
            <div class="header__layout">

                <h1 class="header__logo">
                    <a href="../index.html">
                        <img src="../assets/images/logo.svg" alt="LIFEROOM/ライフルーム不動産">
                    </a>
                </h1>

                <div class="header__cta">
                    <div class="header__tel">

                        <img
                            src="../assets/images/tel-icon.svg"
                            alt="電話アイコン"
                            class="header__icon"
                            width="37"
                            height="49"
                        >

                        <div class="tel__text">
                            <p class="tel__label">電話番号</p>

                            <a href="tel:0311111111" class="tel__num">
                                03-1111-1111
                            </a>

                            <p class="tel__info">
                                受付時間
                                <span class="info__time">9:00~20:00</span>
                            </p>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </header>


    <main>

        <section class="thanks section">

            <div class="container">

                <div class="thanks__layout">

                    <h2 class="section__title">
                        お問い合わせ<br>
                        ありがとうございました
                    </h2>

                    <p class="thanks__text">
                        内容を確認後、担当者より<br>
                        ご連絡させていただきます。
                    </p>

                    <a href="../index.html" class="btn__cta thanks__btn btn__font">
                        TOPへ戻る
                    </a>

                </div>

            </div>

        </section>

    </main>


    <footer>
        <div class="container">

            <div class="footer__layout">

                <div class="footer__logo">
                    <img src="../assets/images/logo.svg" alt="LIFEROOM/ライフルーム不動産">
                </div>

                <div class="tel__text">

                    <p class="tel__label">電話番号</p>

                    <a href="tel:0311111111" class="tel__num">
                        03-1111-1111
                    </a>

                    <p class="tel__info">
                        受付時間
                        <span class="info__time">9:00~20:00</span>
                    </p>

                </div>

            </div>

        </div>
    </footer>

</body>
</html>
